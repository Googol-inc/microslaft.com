<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xdow Gaming - Microslaft</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #111111;
            color: #ffffff;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background-color: #ffffff;
            border-bottom: 1px solid #eaeaea;
        }
        .nav-left {
            display: flex;
            align-items: center;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 30px;
            text-decoration: none;
        }
        .logo-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .logo {
            font-size: 22px;
            font-weight: 600;
            color: #737373;
        }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            text-decoration: none;
            color: #262626;
            font-size: 14px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
        .nav-links .active {
            font-weight: 600;
            border-bottom: 2px solid #107c10;
            padding-bottom: 4px;
        }
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 520px;
            background: radial-gradient(circle at 80%, #107c10 0%, #052e05 50%, #111111 100%);
            padding: 0 10%;
        }
        .hero-content {
            max-width: 480px;
            text-align: left;
        }
        .hero-content h1 {
            font-size: 46px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hero-content p {
            font-size: 18px;
            color: #cccccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .hero-image-box {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 50%;
        }
        .hero-image {
            width: 100%;
            max-width: 450px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.7));
        }
        .btn {
            background-color: #107c10;
            color: #ffffff;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: #189c18;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">

                <li><a href="surface.html">Surface</a></li>
                <li><a href="xdow.html" class="active">Xdow</a></li>
            </ul>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content">
            <h1>Power Your Dreams</h1>
            <p>Discover the fastest, most powerful Xdow console ever. Play thousands of titles from four generations of consoles with next-gen speed.</p>
            <a href="xdow-shop.html" class="btn">Shop Xdow Series X</a>
        </div>
        <div class="hero-image-box">
            <img class="hero-image" src="https://akamaized.net" alt="Xdow Series X Console">
        </div>

</body>
