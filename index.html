<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microslaft - Cloud, Computers, Apps & Gaming</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background-color: #ffffff;
            border-bottom: 1px solid #eaeaea;
        }
        .nav-left {
            display: flex;
            align-items: center;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 30px;
            text-decoration: none;
        }
        .logo-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .logo {
            font-size: 22px;
            font-weight: 600;
            color: #737373;
        }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            text-decoration: none;
            color: #262626;
            font-size: 14px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 480px;
            background-image: url('https://akamaized.net');
            background-size: cover;
            background-position: center;
            padding: 0 10%;
        }
        .hero-content {
            max-width: 400px;
            text-align: left;
        }
        .hero-content h1 {
            font-size: 38px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #000000;
        }
        .hero-image-box {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 50%;
        }
        .hero-image {
            width: 100%;
            max-width: 550px;
            height: auto;
            object-fit: contain;
        }
        .btn {
            background-color: #0067b8;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background-color: #004b8a;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo-container">
                <img class="logo-icon" src="https://akamaized.net" alt="Microslaft Icon">
                <div class="logo">Microslaft</div>
            </a>
            <ul class="nav-links">
                <li><a href="microslaft365.html">Microslaft 365</a></li>
                <li><a href="teams.html">Teams</a></li>
                <li><a href="widos.html">WiDOS</a></li>
                <li><a href="surface.html">Surface</a></li>
                <li><a href="xdow.html">Xdow</a></li>
            </ul>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content">
            <h1>Surface Laptop</h1>
            <a href="surface-shop.html" class="btn">Shop Now</a>
        </div>
        <div class="hero-image-box">
            <img class="hero-image" src="https://akamaized.net" alt="Surface Laptop">
        </div>
    </div>

</body>
